name: Set Version
on: push
jobs:
  build:
    environment: test
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ vars.APP_VERSION }}
    steps:
    - uses: actions/checkout@v2
    - name: Echo env before
      run: echo $APP_VERSION
    - name: Set env
      run: echo "APP_VERSION=v-0.0.20" >> $env:APP_VERSION
    - name: teetet
      run: echo "GITHUB_SHA_SHORT=$(echo $GITHUB_SHA | cut -c 1-6)" >> $env:GITHUB_ENV
    - name: Echo env after
      run: echo $APP_VERSION
